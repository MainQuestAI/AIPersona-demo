services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aipersona_stage}
      POSTGRES_USER: ${POSTGRES_USER:-aipersona}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aipersona_stage}
    ports:
      - "${STAGE_POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-stage-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aipersona} -d ${POSTGRES_DB:-aipersona_stage}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: docker/python-stage.Dockerfile
    working_dir: /workspace
    environment:
      APP_NAME: ${APP_NAME:-aipersona-api}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      APP_ENV: ${APP_ENV:-stage}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-8000}
      API_RELOAD: ${API_RELOAD:-false}
      API_KEY_REQUIRED: ${API_KEY_REQUIRED:-false}
      ENABLE_DEV_AUTH: ${ENABLE_DEV_AUTH:-false}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET}
      SESSION_COOKIE_SECRET: ${SESSION_COOKIE_SECRET}
      WEB_APP_ORIGINS: ${WEB_APP_ORIGINS:-http://localhost:4173,http://127.0.0.1:4173}
      SHARED_DEMO_TEAM_SLUG: ${SHARED_DEMO_TEAM_SLUG:-shared-demo}
      SHARED_DEMO_TEAM_NAME: ${SHARED_DEMO_TEAM_NAME:-共享演示团队}
      DATABASE_URL: postgresql://${POSTGRES_USER:-aipersona}:${POSTGRES_PASSWORD:-aipersona_stage}@postgres:5432/${POSTGRES_DB:-aipersona_stage}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen-plus}
      DASHSCOPE_INPUT_COST_PER_1K: ${DASHSCOPE_INPUT_COST_PER_1K:-0}
      DASHSCOPE_OUTPUT_COST_PER_1K: ${DASHSCOPE_OUTPUT_COST_PER_1K:-0}
    command: ["python", "-m", "app.main"]
    ports:
      - "${STAGE_API_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/python-stage.Dockerfile
    working_dir: /workspace
    environment:
      WORKER_APP_NAME: ${WORKER_APP_NAME:-aipersona-worker}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      APP_ENV: ${APP_ENV:-stage}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql://${POSTGRES_USER:-aipersona}:${POSTGRES_PASSWORD:-aipersona_stage}@postgres:5432/${POSTGRES_DB:-aipersona_stage}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen-plus}
    command: ["python", "-m", "worker.main"]
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/node-stage.Dockerfile
      args:
        VITE_STUDY_RUNTIME_API_URL: ${STAGE_WEB_API_URL:-http://127.0.0.1:8001}
        VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL}
        VITE_OAUTH_CLIENT_ID: ${VITE_OAUTH_CLIENT_ID}
        VITE_ENABLE_DEV_AUTH: ${VITE_ENABLE_DEV_AUTH:-false}
    ports:
      - "${STAGE_WEB_PORT:-4173}:80"
    depends_on:
      - api

volumes:
  postgres-stage-data:
